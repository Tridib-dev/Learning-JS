<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap">
    <style> 
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Montserrat", sans-serif;
        }

        html,body{
            width:100%;
            height:100%;
        }

        #main{
            width:100%;
            height:100%;
            background:#222;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:450px;
            background:#1f1f1f;
            border-radius:20px;
            padding:30px;
        
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:20px;
        }

        input{
            display:none;
        }

        #btn{
            padding:14px 30px;
            border-radius:999px;
            background:#00d4aa;
            color:black;
            font-weight:600;
            cursor:pointer;
            transition:.25s;
            user-select: none;
            cursor: pointer;
        }
        #clicked_button{
            padding:14px 30px;
            border-radius:999px;
            background:#00b38f;
            color:black;
            font-weight:600;
            cursor:pointer;
            transition:.25s;
            user-select: none;
        }

        #btn:hover{
            transform:translateY(-2px);
            background:#00b38f;
        }

        #fileInfo{
            width:100%;
            min-height:80px;
        
            padding:15px;
            border-radius:12px;
        
            background:#2b2b2b;
            color:white;
        
            text-align:left;
            line-height:1.8;
        }
    </style>
</head>
<body>
    <!-- <h3 id="Device"> Select Your <b>Device</b></h3>
    <select>
        <option selected disabled> Select Your Device</option>
        <option value="MI">Xiami</option>
        <option value="Samsung">Samsung</option>
        <option value="Apple IPhone">Iphone</option>
        <option value="Oppo">Oppo</option>
    </select> -->
    <div id="main">
        <div class="card">
            <input type="file" id="inp">
        
            <div id="btn">Upload File</div>
        
            <div id="fileInfo"></div>
        </div>
    </div>
    <script src = "script.js"></script>
</body>
</html>
