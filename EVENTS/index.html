<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #follower{
            position: absolute;
            width:40px;
            height:40px;
            border-radius:50%;
            transition: cubic-bezier(0.19, 1, 0.22, 1) 0.005s;
            position:fixed;
            left:0;
            top:0;

            background:crimson;

            transform:translate(-50%, -50%);
        }
        html,
        body{
            width:100%;
            height:100%;
            background:#222;
            overflow:hidden;
        }
        body{
            overflow: hidden;
            position: relative;
        }
        .lt{
            text-decoration: line-through;
            cursor: pointer;
        }
        #main{
            width:100%;
            height:100%;
            background:#0f1117;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Montserrat", sans-serif;
        }
        html,body{
            width:100%;
            height:100%;
        }
        .card{
            width:450px;
            background:#171923;
            border-radius:20px;
            padding:30px;
        
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:20px;
        } 
        .search-icon{
            position:relative;
            left:18px;
            top:50%;
            transform:translateY(-50%);

            color:#888;
            pointer-events:none;
        }
        .search-container input{
            width: 100%;
            padding: 18px 28px 18px 55px;;
            border: none;
            outline: none;
            border-radius: 30px;
            background: rgba(11, 11, 11, 0.95);
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.35),
                inset 0 0 0 1px rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        .search-container input::placeholder{
            color: #777;
        }
        
        .search-container input:focus{
            background: rgba(40,40,45,1);
            color: white;
            box-shadow:
                0 0 0 3px rgba(114, 127, 122, 0.15),
                0 10px 40px rgba(0,255,170,0.1);
        
            transform: translateY(-2px);
        }
        .search-container p{
            margin-top:10px;
            color:#888;
            font-size:14px;
        }
        .search-container{
            position: relative;
            width: 100%;
        }  
        .span{
            font-weight: bolder;
        }    
    </style>
</head>
<body>
